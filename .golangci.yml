version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - depguard
  settings:
    errcheck:
      # Close() on connections and files is idiomatic to ignore in cleanup paths.
      exclude-functions:
        - (io.Closer).Close
        - (net.Conn).Close
        - (*net.TCPConn).Close
        - (*os.File).Close
        - (net.Listener).Close
        - (*net.TCPListener).Close

    depguard:
      rules:
        # Session-manager delivery code is a thin gRPC client that speaks the
        # mail-session proto directly. It must not pull in store, auth, spam,
        # queue, or metrics — those are either the session-manager's job or
        # the caller's job.
        session-manager-boundary:
          files:
            - "**/smdeliver*.go"
          deny:
            - pkg: "github.com/infodancer/msgstore"
              desc: "session-manager code must use mail-session proto types, not msgstore"
            - pkg: "github.com/infodancer/auth"
              desc: "authentication is the session-manager's responsibility"
            - pkg: "github.com/infodancer/smtpd/internal/queue"
              desc: "outbound queue is a separate concern from delivery"
            - pkg: "github.com/infodancer/smtpd/internal/rspamd"
              desc: "spam checking happens before delivery dispatch"
            - pkg: "github.com/infodancer/smtpd/internal/spamcheck"
              desc: "spam checking happens before delivery dispatch"
            - pkg: "github.com/infodancer/smtpd/internal/metrics"
              desc: "metrics are the caller's responsibility, not the transport agent's"
            - pkg: "github.com/infodancer/mail-deliver"
              desc: "mail-deliver is archived; use session-manager"

        # mail-deliver is being archived. No new imports anywhere.
        no-mail-deliver:
          files:
            - "$all"
          deny:
            - pkg: "github.com/infodancer/mail-deliver"
              desc: "mail-deliver is archived; delivery goes through session-manager or mail-session"
