version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - depguard
  settings:
    errcheck:
      # Close() on connections and files is idiomatic to ignore in cleanup paths.
      exclude-functions:
        - (io.Closer).Close
        - (net.Conn).Close
        - (*net.TCPConn).Close
        - (*os.File).Close
        - (net.Listener).Close
        - (*net.TCPListener).Close

    depguard:
      rules:
        # Session-manager delivery code speaks the mail-session proto directly.
        # It must not depend on msgstore types (Envelope, DeliveryAgent, etc.).
        session-manager-no-msgstore:
          files:
            - "**/smdeliver*.go"
          deny:
            - pkg: "github.com/infodancer/msgstore"
              desc: "session-manager code must use mail-session proto types, not msgstore"
